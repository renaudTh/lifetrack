<app-modal-component [(visible)]="visible">
    <div class="card">
        <div class="card-header">
            <div class="card-header-title">New activity</div>
        </div>
        <div class="card-content ">
            <div class="field">
                <label class="label">Representation</label>
                <div class="control">
                    <input class="input" type="text" placeholder="🚀">
                </div>
            </div>
            <div class="field">
                <label class="label">Description</label>
                <div class="control">
                    <input class="input" type="Text" placeholder="Launch skyrocket">
                </div>
            </div>
            <div class="field">
                <label class="label">Base amount</label>
                <div class="control">
                    <input class="input" type="number" placeholder="1200">
                </div>
            </div>
            <div class="field">
                <label class="label">Unit</label>
                <div class="control">
                    <input class="input" type="Text" placeholder="kph">
                </div>
            </div>

        </div>

        <footer class="card-footer">
            <a class="card-footer-item" (click)="close()">Cancel</a>
            <a class="card-footer-item">Save</a>
        </footer>
    </div>
</app-modal-component>
